name: Deploy to Contabo

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: node ace build --ignore-ts-errors

  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_DIR: backend/gestio_back
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          envs: DEPLOY_DIR
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="$HOME/$DEPLOY_DIR"
            echo "SSH user: $(whoami)"
            echo "HOME: $HOME"
            echo "Deploy dir: $APP_DIR"
            ls -la "$HOME/backend/" || echo "No $HOME/backend/ directory"
            cd "$APP_DIR"
            git pull
            npm install
            node ace build --ignore-ts-errors
            cd build
            npm ci --omit=dev
            cp ../.env .env
            node ace migration:run --force
            pm2 restart gestio-api
